{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-cloud-arrow-up"></i> Import Financial Data
            </div>
            <div class="card-body p-4">
                <div id="uploadFeedback" class="mb-3"></div>
                <form id="uploadForm" method="post" enctype="multipart/form-data">
                    <!-- File Drop Area -->
                    <div class="upload-area mb-3" id="dropArea" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon"><i class="bi bi-file-earmark-arrow-up"></i></div>
                        <div class="upload-label">Click or drag a file here</div>
                        <div class="small opacity-50 mt-1">CSV or XLSX files supported</div>
                        <input type="file" name="file" id="fileInput" accept=".csv, .xlsx">
                        <div class="upload-filename" id="fileName"></div>
                    </div>

                    <!-- File Type -->
                    <div class="mb-3">
                        <label for="filetype" class="form-label">Data Source</label>
                        <select class="form-select" id="filetype" name="filetype">
                            <option value="B3 Negotiation">B3 Negotiation</option>
                            <option value="B3 Movimentation">B3 Movimentation</option>
                            <option value="Avenue Extract">Avenue Extract</option>
                            <option value="Generic Extract">Generic Extract</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="uploadBtn" disabled>
                        <i class="bi bi-upload"></i> Upload
                    </button>
                </form>
                <div id="uploadNextStep" class="mt-3"></div>
            </div>
        </div>

        <!-- Quick links -->
        <div class="text-center mt-3 opacity-50">
            <small>
                After uploading, go to
                <a href="/consolidate" class="text-decoration-none">Consolidate</a>
                to see your portfolio.
            </small>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var dropArea = document.getElementById('dropArea');
    var fileInput = document.getElementById('fileInput');
    var fileName = document.getElementById('fileName');
    var uploadBtn = document.getElementById('uploadBtn');
    var uploadForm = document.getElementById('uploadForm');
    var uploadFeedback = document.getElementById('uploadFeedback');
    var uploadNextStep = document.getElementById('uploadNextStep');

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            fileName.textContent = this.files[0].name;
            uploadBtn.disabled = false;
        }
    });

    ['dragenter', 'dragover'].forEach(function(evt) {
        dropArea.addEventListener(evt, function(e) {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });
    });

    ['dragleave', 'drop'].forEach(function(evt) {
        dropArea.addEventListener(evt, function(e) {
            e.preventDefault();
            dropArea.classList.remove('dragover');
        });
    });

    dropArea.addEventListener('drop', function(e) {
        fileInput.files = e.dataTransfer.files;
        if (fileInput.files.length > 0) {
            fileName.textContent = fileInput.files[0].name;
            uploadBtn.disabled = false;
        }
    });

    function renderFeedback(messages, errors) {
        var html = '';
        (messages || []).forEach(function(message) {
            html += '<div class="alert alert-success alert-dismissible fade show py-2" role="alert">' +
                message +
                '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
            '</div>';
        });
        (errors || []).forEach(function(error) {
            html += '<div class="alert alert-warning alert-dismissible fade show py-2" role="alert">' +
                error +
                '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
            '</div>';
        });
        uploadFeedback.innerHTML = html;
    }

    uploadForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        uploadBtn.disabled = true;
        uploadBtn.classList.add('btn-loading');
        uploadBtn.innerHTML = '<span class="spinner-border" role="status"></span> Uploading...';

        uploadFeedback.innerHTML = '';
        uploadNextStep.innerHTML = '';

        try {
            var response = await fetch('{{ url_for('home') }}', {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'application/json'
                },
                body: new FormData(uploadForm)
            });

            var payload = await response.json();
            renderFeedback(payload.messages, payload.errors);

            if (payload.success && payload.redirect_url) {
                uploadNextStep.innerHTML =
                    '<a href="' + payload.redirect_url + '" class="btn btn-outline-light btn-sm">' +
                    '<i class="bi bi-arrow-right-circle"></i> Abrir resultado</a>';
            }
        } catch (error) {
            renderFeedback([], ['Falha ao enviar arquivo. Tente novamente.']);
        } finally {
            uploadBtn.disabled = fileInput.files.length === 0;
            uploadBtn.classList.remove('btn-loading');
            uploadBtn.innerHTML = '<i class="bi bi-upload"></i> Upload';
        }
    });
});
</script>
{% endblock %}
